site_name: RECAP
site_description: Reproducible Experiment Capture and Provenance
repo_url: https://github.com/nsls2/recap
repo_name: nsls2/recap

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Quickstart: quickstart.md
    - Querying Data: querying_data.md
    - Resource Examples: resource_examples.md
  - API Reference:
    - Client: api/client.md
    - Schemas:
      - Overview: api/schemas/index.md
      - Common: api/schemas/common.md
      - Attributes: api/schemas/attribute.md
      - Resources: api/schemas/resource.md
      - Steps: api/schemas/step.md
      - Processes: api/schemas/process.md
    - DSL Builders:
      - Resource Builders: api/dsl/resource_builder.md
      - Process Builders: api/dsl/process_builder.md
      - Query DSL: api/dsl/query.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: ["."]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            members_order: source
            merge_init_into_class: true
            show_submodules: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html

